name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Go tests
        run: go test ./...

      - name: Sync upstream repository
        run: go run . sync

      - name: Prepare upstream theme sources
        run: go run . prepare-upstream

      - name: Build theme ports
        run: go run . build

      - name: Upload generated artifact
        uses: actions/upload-artifact@v4
        with:
          name: bearded-theme-ports
          path: dist/

      - name: Package release assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd dist
          zip -r ../bearded-theme-ports.zip .
          cd wezterm
          zip -r ../../bearded-theme-ports-wezterm.zip .
          cd ../codex
          zip -r ../../bearded-theme-ports-codex.zip .
          cd ../opencode
          zip -r ../../bearded-theme-ports-opencode.zip .
          cd ../tmtheme
          zip -r ../../bearded-theme-ports-tmtheme.zip .
          cd ../helix
          zip -r ../../bearded-theme-ports-helix.zip .
          cd ../neovim
          zip -r ../../bearded-theme-ports-neovim.zip .
          cd ../kitty
          zip -r ../../bearded-theme-ports-kitty.zip .
          cd ../alacritty
          zip -r ../../bearded-theme-ports-alacritty.zip .
          cd ../ghostty
          zip -r ../../bearded-theme-ports-ghostty.zip .
          cd ../windows-terminal
          zip -r ../../bearded-theme-ports-windows-terminal.zip .
          cd ../firefox-color
          zip -r ../../bearded-theme-ports-firefox-color.zip .

      - name: Generate release notes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            range="$after"
          else
            range="$before..$after"
          fi

          {
            printf '## Commits\n\n'
            git log --format='- %h %s' "$range"
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.0.${{ github.run_number }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" bearded-theme-ports.zip bearded-theme-ports-wezterm.zip bearded-theme-ports-codex.zip bearded-theme-ports-opencode.zip bearded-theme-ports-tmtheme.zip bearded-theme-ports-helix.zip bearded-theme-ports-neovim.zip bearded-theme-ports-kitty.zip bearded-theme-ports-alacritty.zip bearded-theme-ports-ghostty.zip bearded-theme-ports-windows-terminal.zip bearded-theme-ports-firefox-color.zip --clobber
          else
            gh release create "$TAG" bearded-theme-ports.zip bearded-theme-ports-wezterm.zip bearded-theme-ports-codex.zip bearded-theme-ports-opencode.zip bearded-theme-ports-tmtheme.zip bearded-theme-ports-helix.zip bearded-theme-ports-neovim.zip bearded-theme-ports-kitty.zip bearded-theme-ports-alacritty.zip bearded-theme-ports-ghostty.zip bearded-theme-ports-windows-terminal.zip bearded-theme-ports-firefox-color.zip --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
